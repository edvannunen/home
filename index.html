<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bier &amp; Brood</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="banner">
  <img src="img/banner.png" alt="Bier &amp; Brood">
</header>

<main class="wrap">
  <div class="tiles">
    <a class="tile" href="/de-sprong">
      <div class="tile-art"><img src="img/sprong_klein_trans.png" alt="De Sprong"></div>
      <div class="tile-label">De Sprong</div>
    </a>
    <a class="tile" href="/fietsen">
      <div class="tile-art"><img src="img/fietsen_trans.png" alt="Fietsdashboard"></div>
      <div class="tile-label">Fietsdashboard</div>
    </a>
    <a class="tile" href="/strangebrew/">
      <div class="tile-art"><img src="img/Strange Brew - logo.png" alt="Strange Brew dashboard"></div>
      <div class="tile-label">Strange Brew dashboard</div>
    </a>
  </div>
</main>

</body>
</html>
